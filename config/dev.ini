[models]
model_sources = /data/models/CV-models
dinov2_model_name = %(model_sources)s/dinov2-large
sam_checkpoint_path = %(model_sources)s/sam_1/sam_vit_h_4b8939.pth
clip_model_name = %(model_sources)s/clip-vit-base-patch32
sam_model_type = vit_h
# 微调 DINOv2 权重路径（留空则使用原始预训练权重）
dinov2_finetuned_checkpoint = weights/dinov2_custom_classifier.pth

[pipeline]
attention_threshold = 0.15
min_mask_area = 500
num_prompts = 10
confidence_threshold = 0.2
device = cuda

[server]
host = 0.0.0.0
port = 8000
workers = 2
